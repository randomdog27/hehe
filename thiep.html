<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiệp 8/3</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(#ffd6e0,#fff0f5);
    font-family:'Segoe UI', sans-serif;
    overflow:hidden;
}

/* ================= Hoa rơi ================= */
.flower{
    position:absolute;
    top:-50px;
    font-size:20px;
    animation:fall linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(360deg);
    }
}

/* ================= Thiệp ================= */

.card{
    width:340px;
    height:240px;
    position:relative;
    perspective:1500px;
    z-index:10;
}

.card-inner{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
}

/* Bìa */
.card-front{
    position:absolute;
    width:100%;
    height:100%;
    background:#ff4d6d;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:26px;
    font-weight:bold;
    border-radius:15px;
    transform-origin:left;
    transition:transform 1.3s ease;
    backface-visibility:hidden;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

/* Mặt sau bìa (để che chữ hoàn toàn) */
.card-front::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:#ff4d6d;
    border-radius:15px;
    transform:rotateY(180deg);
    backface-visibility:hidden;
}

/* Nội dung bên trong */
.card-inside{
    position:absolute;
    width:100%;
    height:100%;
    background:white;
    border-radius:15px;
    padding:25px;
    box-sizing:border-box;
    text-align:center;
    display:flex;
    justify-content:center;
    align-items:center;
    transform:translateZ(-1px);
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

/* Hover mở */
.card:hover .card-front{
    transform:rotateY(-170deg);
}

/* Tim bay khi mở */
.heart{
    position:absolute;
    font-size:20px;
    animation:fly 2s ease forwards;
}

@keyframes fly{
    0%{opacity:1; transform:translateY(0);}
    100%{opacity:0; transform:translateY(-150px);}
}

</style>
</head>
<body>

<div class="card" id="card">
    <div class="card-inner">
        <div class="card-front">
            💖 Happy 8/3 💖
        </div>

        <div class="card-inside">
            <div>
                <h3>Gửi vợ yêu ❤️</h3>
                <p>
                    Cảm ơn em đã đến bên anh.<br>
                    Chúc em luôn xinh đẹp, hạnh phúc<br>
                    và mãi là điều tuyệt vời nhất của anh.
                </p>
            </div>
        </div>
    </div>
</div>

<script>

/* Hoa rơi */
function createFlower(){
    const flower = document.createElement("div");
    flower.classList.add("flower");
    flower.innerHTML = "🌸";
    flower.style.left = Math.random()*100 + "vw";
    flower.style.animationDuration = (6 + Math.random()*5) + "s";
    flower.style.fontSize = (15 + Math.random()*20) + "px";
    document.body.appendChild(flower);

    setTimeout(()=>{ flower.remove(); },11000);
}
setInterval(createFlower,300);

/* Tim bay khi hover */
const card = document.getElementById("card");

card.addEventListener("mouseenter", ()=>{
    for(let i=0;i<8;i++){
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML="💗";
        heart.style.left = (40 + Math.random()*20) + "%";
        heart.style.top = "50%";
        document.body.appendChild(heart);

        setTimeout(()=>{heart.remove()},2000);
    }
});

</script>

</body>
</html>
