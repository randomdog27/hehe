<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiệp 8/3</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f8e1e7;
    font-family: 'Segoe UI', sans-serif;
}

/* Container */
.card{
    position:relative;
    width:300px;
    height:200px;
    perspective:1000px;
}

/* Bìa ngoài */
.card-front{
    position:absolute;
    width:100%;
    height:100%;
    background:#ff4d6d;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    font-weight:bold;
    border-radius:10px;
    transform-origin:left;
    transition:transform 1s ease;
    backface-visibility:hidden;
}

/* Nội dung bên trong */
.card-inside{
    position:absolute;
    width:100%;
    height:100%;
    background:white;
    color:#333;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    border-radius:10px;
}

/* Hover mở thiệp */
.card:hover .card-front{
    transform:rotateY(-160deg);
}
</style>

</head>
<body>

<div class="card">
    <div class="card-front">
        💖 Happy 8/3 💖
    </div>
    <div class="card-inside">
        <div>
            <h3>Gửi vợ yêu ❤️</h3>
            <p>
                Cảm ơn em đã đến bên anh.<br>
                Chúc em luôn xinh đẹp, hạnh phúc<br>
                và mãi là điều tuyệt vời nhất của anh.
            </p>
        </div>
    </div>
</div>

</body>
</html>
