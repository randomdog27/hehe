<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiệp 8/3 ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    overflow:hidden;
    font-family:Arial, sans-serif;
}

/* Hoa rơi */
.flower{
    position:fixed;
    top:-30px;
    font-size:20px;
    animation:fall linear forwards;
}
@keyframes fall{
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}

/* Card container */
.scene{
    width:320px;
    height:420px;
    perspective:1200px;
}

.card{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform 1s;
    cursor:pointer;
}

/* Each page */
.page{
    position:absolute;
    width:100%;
    height:100%;
    backface-visibility:hidden;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.page img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Music button */
.music-btn{
    position:fixed;
    top:20px;
    right:20px;
    background:white;
    border:none;
    padding:10px 15px;
    border-radius:20px;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
</style>
</head>
<body>

<button class="music-btn" onclick="toggleMusic()">🔊 Nhạc</button>

<div class="scene">
    <div class="card" id="card">

        <!-- Trang 1 -->
        <div class="page" style="background:#ff4f81;color:white;font-size:26px;font-weight:bold;">
            Happy 8/3 ❤️<br>Gửi vợ yêu
        </div>

        <!-- Trang 2 lời chúc -->
        <div class="page" style="transform:rotateY(180deg);">
            Chúc em luôn xinh đẹp,<br>
            hạnh phúc và mãi là<br>
            điều tuyệt vời nhất ❤️
        </div>

        <!-- Ảnh 1 -->
        <div class="page" style="transform:rotateY(360deg);">
            <img src="https://drive.google.com/uc?export=view&id=1_XXtKMewZQHzCN_NfCSofeFMvRjNHE6_">
        </div>

        <!-- Ảnh 2 -->
        <div class="page" style="transform:rotateY(540deg);">
            <img src="https://drive.google.com/uc?export=view&id=1_0ZbrgSCEzrLKTxshwMMUbVAbN8CZ05e">
        </div>

        <!-- Ảnh 3 -->
        <div class="page" style="transform:rotateY(720deg);">
            <img src="https://drive.google.com/uc?export=view&id=1YTLY5V1p9EBpOg8n1QyZgdzN2HoTOZoI">
        </div>

        <!-- Ảnh 4 -->
        <div class="page" style="transform:rotateY(900deg);">
            <img src="https://drive.google.com/uc?export=view&id=1jprDCY4tdCD48PwkK0KIrCnoa16P7uW4">
        </div>

        <!-- Ảnh 5 -->
        <div class="page" style="transform:rotateY(1080deg);">
            <img src="https://drive.google.com/uc?export=view&id=1-WtW5Th5UYL1-Lp4olT25z6xpCeArIwT">
        </div>

    </div>
</div>

<!-- SoundCloud -->
<iframe id="player"
width="0"
height="0"
allow="autoplay"
src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/devilkjss/i-love-you-and-i-love-you-oh">
</iframe>

<script>
let currentRotation = 0;
const card = document.getElementById("card");

card.addEventListener("click", ()=>{
    currentRotation -= 180;
    card.style.transform = "rotateY("+currentRotation+"deg)";
});

/* Hoa rơi */
function createFlower(){
    const f=document.createElement("div");
    f.className="flower";
    f.innerHTML="🌸";
    f.style.left=Math.random()*100+"vw";
    f.style.animationDuration=4+Math.random()*6+"s";
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),10000);
}
setInterval(createFlower,500);

/* Nhạc */
let playing=false;
const player=document.getElementById("player");

function toggleMusic(){
    if(!playing){
        player.src+="&auto_play=true";
        playing=true;
    }else{
        player.src=player.src.replace("&auto_play=true","");
        playing=false;
    }
}
</script>

</body>
</html>
