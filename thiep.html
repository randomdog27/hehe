<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiệp 8/3 ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffdde1,#ee9ca7);
    overflow:hidden;
    font-family:Arial;
}

/* Hoa rơi */
.flower{
    position:fixed;
    font-size:22px;
    pointer-events:none;
    animation:fall linear forwards;
}
@keyframes fall{
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}

/* Thiệp */
.scene{
    perspective:1200px;
}

.card{
    width:320px;
    height:420px;
    position:relative;
    transform-style:preserve-3d;
    transition:transform 1s;
    cursor:pointer;
}

.face{
    position:absolute;
    width:100%;
    height:100%;
    backface-visibility:hidden;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.front{
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    font-weight:bold;
    color:#e91e63;
}

.back{
    transform:rotateY(180deg);
    background:white;
}

.back img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Nút nhạc */
.music-btn{
    position:fixed;
    top:20px;
    right:20px;
    background:#fff;
    border:none;
    padding:10px 15px;
    border-radius:20px;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    z-index:10;
}
</style>
</head>

<body>

<button class="music-btn" onclick="toggleMusic()">🔊 Nhạc</button>

<div class="scene">
    <div class="card" id="card">
        <div class="face front">
            Happy 8/3 ❤️
        </div>

        <div class="face back">
            <img src="https://drive.google.com/uc?export=view&id=1_XXtKMewZQHzCN_NfCSofeFMvRjNHE6_">
        </div>

        <div class="face back">
            <img src="https://drive.google.com/uc?export=view&id=1_0ZbrgSCEzrLKTxshwMMUbVAbN8CZ05e">
        </div>

        <div class="face back">
            <img src="https://drive.google.com/uc?export=view&id=1YTLY5V1p9EBpOg8n1QyZgdzN2HoTOZoI">
        </div>

        <div class="face back">
            <img src="https://drive.google.com/uc?export=view&id=1jprDCY4tdCD48PwkK0KIrCnoa16P7uW4">
        </div>

        <div class="face back">
            <img src="https://drive.google.com/uc?export=view&id=1-WtW5Th5UYL1-Lp4olT25z6xpCeArIwT">
        </div>

    </div>
</div>

<!-- SoundCloud -->
<iframe id="player"
width="0"
height="0"
scrolling="no"
frameborder="no"
allow="autoplay"
src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/devilkjss/i-love-you-and-i-love-you-oh">
</iframe>

<script>
let rotateY = 0;
const card = document.getElementById("card");

card.addEventListener("click", ()=>{
    rotateY += 180;
    card.style.transform = "rotateY("+rotateY+"deg)";
});

/* Hoa rơi */
function createFlower(){
    const flower=document.createElement("div");
    flower.className="flower";
    flower.innerHTML="🌸";
    flower.style.left=Math.random()*100+"vw";
    flower.style.animationDuration=5+Math.random()*5+"s";
    document.body.appendChild(flower);
    setTimeout(()=>flower.remove(),10000);
}
setInterval(createFlower,500);

/* Nhạc */
let playing=false;
const player=document.getElementById("player");

function toggleMusic(){
    if(!playing){
        player.src+="&auto_play=true";
        playing=true;
    }else{
        player.src=player.src.replace("&auto_play=true","");
        playing=false;
    }
}
</script>

</body>
</html>
