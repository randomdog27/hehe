<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiệp 8/3</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(#ffd6e0,#fff0f5);
    font-family:'Segoe UI', sans-serif;
    overflow:hidden;
}

/* Nút nhạc */
.music-btn{
    position:fixed;
    top:20px;
    right:20px;
    background:#ff4d6d;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:20px;
    cursor:pointer;
    z-index:1000;
}

/* Hoa rơi */
.flower{
    position:absolute;
    top:-50px;
    font-size:20px;
    animation:fall linear infinite;
}
@keyframes fall{
    to{ transform:translateY(110vh) rotate(360deg); }
}

/* Thiệp */
.card{
    width:340px;
    height:240px;
    perspective:1200px;
    cursor:pointer;
}

.card-inner{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform 1s ease;
}

.card-front,
.card-back{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:15px;
    backface-visibility:hidden;
}

.card-front{
    background:#ff4d6d;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:26px;
    font-weight:bold;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

.card-back{
    background:white;
    transform:rotateY(180deg);
    padding:25px;
    box-sizing:border-box;
    text-align:center;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

/* Tim */
.heart{
    position:absolute;
    font-size:20px;
    animation:fly 2s ease forwards;
}
@keyframes fly{
    0%{opacity:1; transform:translateY(0);}
    100%{opacity:0; transform:translateY(-150px);}
}
</style>
</head>

<body>

<button class="music-btn" id="musicBtn">🔈 Bật nhạc</button>

<!-- SoundCloud Embed -->
<iframe id="scplayer"
    width="0"
    height="0"
    allow="autoplay"
    src="https://w.soundcloud.com/player/?url=https://soundcloud.com/devilkjss/i-love-you-and-i-love-you-oh&auto_play=false">
</iframe>

<div class="card" id="card">
    <div class="card-inner" id="cardInner">
        <div class="card-front">
            💖 Happy 8/3 💖
        </div>
        <div class="card-back">
            <div>
                <h3>Gửi vợ yêu ❤️</h3>
                <p>
                    Cảm ơn em đã đến bên anh.<br>
                    Chúc em luôn xinh đẹp, hạnh phúc<br>
                    và mãi là điều tuyệt vời nhất của anh.
                </p>
            </div>
        </div>
    </div>
</div>

<script src="https://w.soundcloud.com/player/api.js"></script>

<script>

// Hoa rơi
function createFlower(){
    const flower=document.createElement("div");
    flower.classList.add("flower");
    flower.innerHTML="🌸";
    flower.style.left=Math.random()*100+"vw";
    flower.style.animationDuration=(5+Math.random()*4)+"s";
    flower.style.fontSize=(15+Math.random()*20)+"px";
    document.body.appendChild(flower);
    setTimeout(()=>flower.remove(),11000);
}
setInterval(createFlower,300);

// SoundCloud API
const iframe = document.getElementById("scplayer");
const widget = SC.Widget(iframe);

let musicPlaying = false;

document.getElementById("musicBtn").addEventListener("click", ()=>{
    if(musicPlaying){
        widget.pause();
        musicPlaying=false;
        musicBtn.innerText="🔈 Bật nhạc";
    }else{
        widget.play();
        musicPlaying=true;
        musicBtn.innerText="🔊 Tắt nhạc";
    }
});

// Thiệp xoay vô hạn
const cardInner=document.getElementById("cardInner");
let angle=0;

document.getElementById("card").addEventListener("click", ()=>{

    angle+=180;
    cardInner.style.transform=`rotateY(${angle}deg)`;

    if(!musicPlaying){
        widget.play();
        musicPlaying=true;
        musicBtn.innerText="🔊 Tắt nhạc";
    }

    for(let i=0;i<8;i++){
        const heart=document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML="💗";
        heart.style.left=(40+Math.random()*20)+"%";
        heart.style.top="55%";
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),2000);
    }
});
</script>

</body>
</html>
