<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiệp 8/3</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(#ffd6e0,#fff0f5);
    font-family: 'Segoe UI', sans-serif;
    overflow:hidden;
}

/* Hoa rơi */
.flower{
    position:absolute;
    top:-50px;
    font-size:20px;
    animation:fall linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(360deg);
    }
}

/* Thiệp */
.card{
    position:relative;
    width:320px;
    height:220px;
    perspective:1200px;
    z-index:10;
}

.card-front, .card-inside{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* Bìa */
.card-front{
    background:#ff4d6d;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    font-weight:bold;
    transform-origin:left;
    transition:transform 1.2s ease;
    backface-visibility:hidden;
}

/* Nội dung */
.card-inside{
    background:white;
    padding:20px;
    box-sizing:border-box;
    text-align:center;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Hover mở */
.card:hover .card-front{
    transform:rotateY(-170deg);
}
</style>
</head>

<body>

<div class="card">
    <div class="card-front">
        🌷 Happy 8/3 🌷
    </div>
    <div class="card-inside">
        <div>
            <h3>Gửi vợ yêu ❤️</h3>
            <p>
                Cảm ơn em đã đồng hành cùng anh.<br>
                Chúc em luôn xinh đẹp, hạnh phúc<br>
                và mãi là điều tuyệt vời nhất của anh.
            </p>
        </div>
    </div>
</div>

<script>
function createFlower(){
    const flower = document.createElement("div");
    flower.classList.add("flower");
    flower.innerHTML = "🌸";
    flower.style.left = Math.random()*100 + "vw";
    flower.style.animationDuration = (5 + Math.random()*5) + "s";
    flower.style.fontSize = (15 + Math.random()*20) + "px";
    document.body.appendChild(flower);

    setTimeout(()=>{
        flower.remove();
    },10000);
}

setInterval(createFlower, 300);
</script>

</body>
</html>
